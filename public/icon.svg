<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E5C158"/>
      <stop offset="50%" style="stop-color:#D4AF37"/>
      <stop offset="100%" style="stop-color:#B8960C"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background circle -->
  <circle cx="96" cy="96" r="90" fill="url(#goldGradient)" filter="url(#shadow)"/>
  <!-- Inner decorative ring -->
  <circle cx="96" cy="96" r="75" fill="none" stroke="#B8960C" stroke-width="3"/>
  <circle cx="96" cy="96" r="70" fill="none" stroke="#E5C158" stroke-width="1"/>
  <!-- Letter D -->
  <text x="96" y="115" font-family="Arial, sans-serif" font-size="80" font-weight="bold" fill="#FFFFFF" text-anchor="middle" filter="url(#shadow)">D</text>
  <!-- Small decorative elements -->
  <circle cx="96" cy="25" r="5" fill="#E5C158"/>
  <circle cx="96" cy="167" r="5" fill="#E5C158"/>
  <circle cx="25" cy="96" r="5" fill="#E5C158"/>
  <circle cx="167" cy="96" r="5" fill="#E5C158"/>
</svg>